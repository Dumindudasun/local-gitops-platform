apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: frontend-smoke-test
  namespace: demo
spec:
  metrics:
    - name: smoke-test
      successCondition: result == 0
      failureLimit: 1
      provider:
        job:
          spec:
            backoffLimit: 0
            template:
              spec:
                restartPolicy: Never
                containers:
                  - name: smoke
                    image: curlimages/curl:8.5.0
                    command:
                      - sh
                      - -c
                      - |
                        curl -fsS http://frontend-canary/ || exit 1