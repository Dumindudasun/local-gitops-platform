apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: worker-demo
  namespace: argocd
spec:
  project: app-project
  source:
    repoURL: https://github.com/Dumindudasun/local-gitops-platform.git
    targetRevision: main
    path: gitops/apps/worker/overlays/demo
  destination:
    server: https://kubernetes.default.svc
    namespace: demo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true